    <!-- GitHub Pages SPA redirect restore -->
    <script>
      (function() {
        // Support both key names for backwards compatibility
        var redirect = sessionStorage.getItem('spa_redirect') || sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          sessionStorage.removeItem('redirect');
          if (redirect !== window.location.href) {
            window.history.replaceState(null, null, redirect);
          }
        }
      })();
    </script>

    <meta property="og:title" content="DarkStream AI AUTOMATION" />
    <meta property="og:description" content="Automação completa de criação e publicação de vídeos no YouTube com IA." />
