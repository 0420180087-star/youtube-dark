<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DarkStream AI</title>
    <script>
      // GitHub Pages SPA Fallback
      // When a direct URL like /youtube-dark/project/123 is accessed,
      // GitHub serves this 404.html. We save the full URL to sessionStorage
      // and redirect to the app root, which restores the path via history.replaceState.
      (function() {
        var full = window.location.href;
        // Detect base: origin + first path segment (repo name)
        var parts = window.location.pathname.split('/').filter(Boolean);
        var base = window.location.origin + (parts.length > 0 ? '/' + parts[0] + '/' : '/');
        sessionStorage.setItem('spa_redirect', full);
        window.location.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
