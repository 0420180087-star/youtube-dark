<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DarkStream AI</title>
    <script>
      // SPA redirect for GitHub Pages
      // Stores the real URL in sessionStorage and redirects to base
      // index.html will read it and use history.replaceState
      sessionStorage.redirect = location.href;
      var base = location.pathname.split('/').slice(0, 2).join('/') + '/';
      location.replace(base);
    </script>
  </head>
  <body></body>
</html>
